<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TodoList 실습</title>

    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="container">
      <h1>TodoList</h1>
      <p class="description">오늘 해야 할 일을 입력하고 관리해 봅니다.</p>

      <form id="todoForm" class="todo-form">
        <input
          type="text"
          id="todoInput"
          placeholder="할 일을 입력하세요"
          autocomplete="off"
        />
        <button type="submit">추가</button>
      </form>

      <!-- 개수 / 필터 / 전체 삭제 -->
      <div class="toolbar">
        <p id="todoCount" class="todo-count">할 일 0개</p>
        <div class="filters">
          <button type="button" class="filter-button active" data-filter="all">
            전체
          </button>
          <button type="button" class="filter-button" data-filter="active">
            진행중
          </button>
          <button type="button" class="filter-button" data-filter="done">
            완료
          </button>
        </div>
        <button type="button" id="clearAllBtn" class="clear-all-button">
          전체 삭제
        </button>
      </div>

      <ul id="todoList" class="todo-list"></ul>
    </main>
  </body>
</html>
